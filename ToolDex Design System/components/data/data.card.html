<!-- @dsCard group="Components" viewport="700x300" name="Data — tool cards & badges" subtitle="ToolCard (grid + list), tool-type icons, and the color-coded DataBadge family" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 18px; }
  #root { display: flex; flex-direction: column; gap: 14px; }
  .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-sub); margin-bottom: 8px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { ToolCard, DataBadge } = window.ToolDexDesignSystem_d6b872;
  const A = { tool_type:'drill', description:'PS D-53 5/16 Carbide drill 1.693 LOC', proshop_id:'D-53', machine_tool_number:4, diameter:0.3125, number_of_flutes:2, vendor:'Guhring', location:'CAB-2 · B3' };
  const B = { tool_type:'flat end mill', description:'1/2" 3FL AlTiN Rougher', proshop_id:'A-12', diameter:0.5, number_of_flutes:3, coating:'AlTiN', vendor:'Helical', preferred_machine:'VF-2' };
  function Demo(){
    return (
      <>
        <div><div className="lbl">Tool card · grid &amp; list</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <ToolCard tool={A} />
            <ToolCard tool={B} />
          </div>
          <div style={{marginTop:8}}><ToolCard tool={A} variant="list" /></div>
        </div>
        <div><div className="lbl">DataBadge family</div>
          <div className="row">
            <DataBadge kind="description">3/8 Bull Mill .125R</DataBadge>
            <DataBadge kind="proshop">A-35</DataBadge>
            <DataBadge kind="machine">4</DataBadge>
            <DataBadge kind="location">CAB-2 · B3</DataBadge>
            <DataBadge kind="holder">NBT30-SK13C-60</DataBadge>
            <DataBadge kind="holder">NBT30-SK20C-90</DataBadge>
            <DataBadge kind="preset" material="304 Stainless">SS 1.500 30-SK13-60 - Rough</DataBadge>
            <DataBadge kind="preset" isoGroup="N">AL 1.250 - Finish</DataBadge>
            <DataBadge kind="no-fusion">No Fusion data</DataBadge>
          </div>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
