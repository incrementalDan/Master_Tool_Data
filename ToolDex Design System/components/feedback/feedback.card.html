<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 18px; }
  #root { display: flex; flex-direction: column; gap: 12px; }
  .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-sub); margin-bottom: 8px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Toast, Banner, Spinner, Button } = window.ToolDexDesignSystem_d6b872;
  const Tri = () => (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.7 18-8-14a2 2 0 0 0-3.4 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.7-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>);
  function Demo(){
    return (
      <>
        <div><div className="lbl">Toasts</div>
          <div className="row">
            <Toast type="success" message="Exported ProShop CSV" />
            <Toast type="error" message="Sign-in failed — check Drive access" />
            <Toast type="info" message="Library synced 2 min ago" />
          </div>
        </div>
        <div><div className="lbl">Banners</div>
          <Banner tone="warn" icon={<Tri/>} action={<Button variant="secondary" size="sm">Open Settings</Button>}>
            Google Drive disconnected — metadata changes won't be saved.
          </Banner>
        </div>
        <div><div className="lbl">Spinner</div>
          <div className="row">
            <Spinner />
            <Button variant="primary"><Spinner size={15} borderWidth={2} /> Saving…</Button>
          </div>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
