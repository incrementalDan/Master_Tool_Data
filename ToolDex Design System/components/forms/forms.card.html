<script src="../../_ds_bundle.js"></script>
<script type="text/babel">

        <div className="grid">
          <Input label="Stickout (OOH)" value="1.693" onChange={()=>{}} hint="inches, 3 decimals" />

          <Select label="Coating" value="AlTiN" onChange={()=>{}} options={['Uncoated','TiN','AlTiN','TiAlN','DLC']} />
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
