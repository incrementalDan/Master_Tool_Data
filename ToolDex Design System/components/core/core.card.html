<!-- @dsCard group="Components" viewport="700x340" name="Core — buttons, badges, chips" subtitle="Button variants & sizes, icon buttons, badges, chips, segmented toggle" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 20px; }
  #root { display: flex; flex-direction: column; gap: 16px; }
  .group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-sub); margin-bottom: 6px; }
  .sec { display: flex; flex-direction: column; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, IconButton, Badge, Chip, SegmentedToggle, ToolTypeIcon } = window.ToolDexDesignSystem_d6b872;
  const Grid = () => (
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
  );
  const Rows = () => (
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
  );
  function Demo() {
    const [unit, setUnit] = React.useState('in');
    const [view, setView] = React.useState('grid');
    const [chip, setChip] = React.useState('carbide');
    return (
      <>
        <div className="sec"><div className="lbl">Button variants</div>
          <div className="group">
            <Button variant="primary">Add Tool</Button>
            <Button variant="secondary">Change library</Button>
            <Button variant="ghost">Reset</Button>
            <Button variant="danger">Delete</Button>
            <Button variant="success">Save</Button>
            <Button variant="secondary" disabled>Disabled</Button>
          </div>
        </div>
        <div className="sec"><div className="lbl">Sizes &amp; icon buttons</div>
          <div className="group">
            <Button variant="primary" size="sm">Small</Button>
            <Button variant="primary">Medium</Button>
            <Button variant="primary" size="lg">Large</Button>
            <span style={{width:8}} />
            <IconButton title="Grid view" active={view==='grid'} onClick={()=>setView('grid')}><Grid/></IconButton>
            <IconButton title="List view" active={view==='list'} onClick={()=>setView('list')}><Rows/></IconButton>
          </div>
        </div>
        <div className="sec"><div className="lbl">Badges</div>
          <div className="group">
            <Badge><span className="dia">⌀</span> 0.375 in</Badge><Badge>4FL</Badge><Badge>AlTiN</Badge>
            <Badge variant="blue">VF-2</Badge><Badge variant="orange">RTA-22</Badge>
          </div>
        </div>
        <div className="sec"><div className="lbl">Chips &amp; segmented toggle</div>
          <div className="group">
            <Chip active={chip==='carbide'} onClick={()=>setChip('carbide')}>Carbide</Chip>
            <Chip active={chip==='hss'} onClick={()=>setChip('hss')}>HSS</Chip>
            <Chip variant="type" active><ToolTypeIcon type="drill" size={15}/> Drill</Chip>
            <span style={{width:8}} />
            <SegmentedToggle value={unit} onChange={setUnit} options={[{value:'in',label:'in'},{value:'mm',label:'mm'}]} />
          </div>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
