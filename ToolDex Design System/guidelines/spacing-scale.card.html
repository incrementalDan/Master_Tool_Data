<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px grid — most gaps live in 6–16px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px; display: flex; flex-direction: column; gap: 7px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .bar { height: 12px; background: var(--blue); border-radius: 2px; }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--text-sub); width: 130px; }
</style>
</head>
<body>
  <div class="row"><span class="v">--space-2 · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="v">--space-3 · 6</span><div class="bar" style="width:6px"></div></div>
  <div class="row"><span class="v">--space-4 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="v">--space-6 · 12</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="v">--space-8 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="v">--space-10 · 20</span><div class="bar" style="width:20px"></div></div>
  <div class="row"><span class="v">--space-16 · 32</span><div class="bar" style="width:32px"></div></div>
</body>
</html>
