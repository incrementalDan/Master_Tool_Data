<!-- @dsCard group="Colors" viewport="700x150" name="Text & border ramp" subtitle="Four text weights on dark + hairline borders" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 18px; display: flex; gap: 26px; align-items: center; }
  .stack { display: flex; flex-direction: column; gap: 9px; }
  .line { display: flex; align-items: baseline; gap: 10px; }
  .label { font-size: 15px; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--text-sub); }
  .borders { display: flex; flex-direction: column; gap: 10px; padding-left: 26px; border-left: 1px solid var(--border); }
  .bbar { width: 150px; height: 0; border-top: 2px solid; }
  .bcap { font-size: 11px; color: var(--text-sub); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="stack">
    <div class="line"><span class="label" style="color:var(--text)">Primary text</span><span class="val">--text #f5f5f5</span></div>
    <div class="line"><span class="label" style="color:var(--text-label)">Field label</span><span class="val">--text-label #dcdcdc</span></div>
    <div class="line"><span class="label" style="color:var(--text-sub)">Secondary / meta</span><span class="val">--text-sub #bdbdbd</span></div>
    <div class="line"><span class="label" style="color:var(--text-faint)">Placeholder / disabled</span><span class="val">--text-faint #6e6e6e</span></div>
  </div>
  <div class="borders">
    <div class="bbar" style="border-color:var(--border)"></div><span class="bcap">--border #484848</span>
    <div class="bbar" style="border-color:var(--border-strong)"></div><span class="bcap">--border-strong #555</span>
  </div>
</body>
</html>
