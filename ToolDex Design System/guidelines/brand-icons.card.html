<!-- @dsCard group="Brand" viewport="700x520" name="Tool-type icon set" subtitle="Hand-drawn line silhouettes — the ToolDex visual signature" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 12px; }
  #root { display: flex; flex-direction: column; gap: 14px; }
  .group-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-sub); margin: 0 0 8px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 6px 2px; background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); }
  .tile span { font-size: 12px; font-weight: 600; line-height: 1.2; text-align: center; }
  .ic { color: var(--blue); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<script type="text/babel">
  const { ToolTypeIcon } = window.ToolDexDesignSystem_d6b872;
  const GROUPS = [
    ['Milling', [
      ['flat end mill','Flat EM'],['ball end mill','Ball EM'],['bull nose end mill','Bull Nose'],['radius mill','Radius'],
      ['tapered mill','Tapered'],['chamfer mill','Chamfer'],['lollipop mill','Lollipop'],['dovetail','Dovetail'],
      ['slot/key cutter','Slot/Key'],['form mill','Form'],['thread mill','Thread Mill'],['circle segment barrel','CS Barrel'],
      ['circle segment lens','High Feed'],['circle segment oval','CS Oval'],['circle segment taper','CS Taper'],
    ]],
    ['Hole Making', [
      ['drill','Drill'],['tap','Tap'],['spot drill','Spot Drill'],['center drill','Center Drill'],['reamer','Reamer'],
      ['counter bore','C-Bore'],['counter sink','C-Sink'],['boring head','Boring'],
    ]],
    ['Turning', [
      ['turning general','Turning'],
    ]],
  ];
  ReactDOM.createRoot(document.getElementById('root')).render(
    GROUPS.map(([group, types]) => (
      <div key={group}>
        <div className="group-title">{group}</div>
        <div className="grid">
          {types.map(([t,l]) => (
            <div className="tile" key={t}>
              <span className="ic"><ToolTypeIcon type={t} size={58} /></span>
              <span>{l}</span>
            </div>
          ))}
        </div>
      </div>
    ))
  );
</script>
</body>
</html>
