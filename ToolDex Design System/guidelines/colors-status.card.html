<!-- @dsCard group="Colors" viewport="700x150" name="Status hues" subtitle="Reserved for meaning — success, error, warning, attention" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 18px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw { flex: 1; min-width: 120px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 52px; }
  .meta { padding: 6px 9px; background: var(--surface); }
  .name { font-size: 12px; font-weight: 600; color: var(--text); }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--text-sub); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--green)"></div><div class="meta"><div class="name">success</div><div class="val">#45b36b</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--red)"></div><div class="meta"><div class="name">error</div><div class="val">#d94f4f</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--amber)"></div><div class="meta"><div class="name">warning</div><div class="val">#d4922a</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--orange)"></div><div class="meta"><div class="name">attention</div><div class="val">#d97830</div></div></div>
  </div>
</body>
</html>
