<!-- @dsCard group="Colors" viewport="700x150" name="Surface ramp" subtitle="Dark-first greys: app → card → raised → pop, plus recessed input" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 18px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw { flex: 1; min-width: 96px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 64px; }
  .meta { padding: 7px 9px; background: var(--surface-2); }
  .name { font-size: 12px; font-weight: 600; color: var(--text); }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--text-sub); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="meta"><div class="name">app</div><div class="val">#383838</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface)"></div><div class="meta"><div class="name">card</div><div class="val">#2a2a2a</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-2)"></div><div class="meta"><div class="name">raised</div><div class="val">#333333</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-3)"></div><div class="meta"><div class="name">pop</div><div class="val">#3c3c3c</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--input-bg)"></div><div class="meta"><div class="name">input</div><div class="val">#1e1e1e</div></div></div>
  </div>
</body>
</html>
