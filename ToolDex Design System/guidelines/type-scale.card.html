<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="Tight, dense scale — operators scan large tables" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px; display: flex; flex-direction: column; gap: 9px; }
  .row { display: flex; align-items: baseline; gap: 14px; }
  .row .t { color: var(--text); font-family: var(--font-sans); line-height: 1.1; }
  .row .v { font-family: var(--font-mono); font-size: 11px; color: var(--text-sub); margin-left: auto; }
</style>
</head>
<body>
  <div class="row"><span class="t" style="font-size:44px;font-family:var(--font-display);font-weight:600">Display</span><span class="v">4xl · 44 / display</span></div>
  <div class="row"><span class="t" style="font-size:30px;font-weight:600">Hero</span><span class="v">3xl · 30</span></div>
  <div class="row"><span class="t" style="font-size:22px;font-weight:700">Page title</span><span class="v">2xl · 22</span></div>
  <div class="row"><span class="t" style="font-size:19px;font-weight:700">Detail title</span><span class="v">xl · 19</span></div>
  <div class="row"><span class="t" style="font-size:16px;font-weight:600">Section / modal</span><span class="v">lg · 16</span></div>
  <div class="row"><span class="t" style="font-size:14px">Body / search</span><span class="v">md · 14</span></div>
  <div class="row"><span class="t" style="font-size:13px">Control text</span><span class="v">base · 13</span></div>
  <div class="row"><span class="t" style="font-size:12px;color:var(--text-sub)">Dense cell / secondary</span><span class="v">sm · 12</span></div>
  <div class="row"><span class="t" style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-sub);font-weight:600">Field label</span><span class="v">xs · 11</span></div>
</body>
</html>
