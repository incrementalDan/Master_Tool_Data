name: Deploy to GitHub Pages

# Build the site and publish it to GitHub Pages whenever main changes.
# Can also be run manually from the Actions tab (Run workflow).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed for the official GitHub Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_APS_CLIENT_ID: ${{ secrets.VITE_APS_CLIENT_ID }}
          VITE_APS_CALLBACK_URL: ${{ secrets.VITE_APS_CALLBACK_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_METADATA_FILE_ID: ${{ secrets.VITE_METADATA_FILE_ID }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
