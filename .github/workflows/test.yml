name: Tests

# Run the unit tests + round-trip converter audit on every PR and on pushes
# to main. A red check here blocks merging a change that breaks core logic.
# Pure logic only — no APS/Google secrets needed.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (catches undefined vars / missing imports)
        run: npm run lint

      - name: Run tests
        run: npm test
